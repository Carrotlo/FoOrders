# Native dialog shown for price-per-item input when Paper Dialog API is available.
# Valid placeholders: {current}, {target}
# Expected format: positive money amount. Compact suffixes like 1k, 2.5m are accepted.
# Invalid values keep current behavior and return to the order GUI.
title: "#03fc88Number Input"
body: "#a7b8b0Type price per item."
field-label: "#03fc88Price"
initial-value: "{current}"
placeholder: "100"
confirm-button:
  label: "#3ecf8eSave"
  tooltip: "Set price"
  width: 120
  icon: "emerald"
cancel-button:
  label: "#ff5d73Cancel"
  tooltip: "Keep current price"
  width: 100
  icon: "barrier"
body-width: 320
input-width: 240
max-length: 32
label-visible: true
can-close-with-escape: true
pause: false
